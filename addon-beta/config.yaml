---
name: "EnOcean MQTT UI (Beta)"
version: "1.6.1-beta1"
slug: "enocean-mqtt-ui-beta"
description: "BETA test build of EnOcean MQTT UI. For field-testing unreleased features (currently in sync with stable 1.6.1). Install alongside the stable app; do not run both against the same gateway/MQTT prefix at once."
url: "https://github.com/ESDN83/HA_enoceanmqtt-addon-ui"
stage: experimental
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
uart: true
udev: true
ingress: true
ingress_port: 8099
panel_icon: mdi:radio-tower
panel_title: "EnOcean β"
homeassistant_api: true
hassio_api: true
services:
  - mqtt:want
map:
  - config:rw
  - share:rw

options:
  serial_port: ""
  tcp_port: ""
  log_level: "info"
  cache_device_states: true
  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
    discovery_prefix: "homeassistant"
    prefix: "enoceanmqtt"
    client_id: "enocean_gateway"

schema:
  # Plain optional text field. A native device(subsystem=tty) selector would
  # show a device list in the Config tab, but HA cannot save/validate it empty
  # ("Device '' does not exist"), which blocks TCP-only setups and breaks
  # updates for anyone without a device selected. Free text stays empty-safe.
  serial_port: "str?"
  tcp_port: "str?"
  log_level: "list(debug|info|warning|error)"
  cache_device_states: "bool"
  mqtt:
    host: "str?"
    port: "port?"
    username: "str?"
    password: "password?"
    discovery_prefix: "str"
    prefix: "str"
    client_id: "str"
