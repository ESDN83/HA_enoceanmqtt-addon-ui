---
configuration:
  serial_port:
    name: Porta serial
    description: "Porta serial do transceptor USB EnOcean (ex. /dev/ttyUSB0)."
  log_level:
    name: "N\u00EDvel de log"
    description: "N\u00EDvel de detalhe dos registros do aplicativo."
  cache_device_states:
    name: Armazenar estados dos dispositivos
    description: "Salvar e restaurar estados dos dispositivos ap\u00F3s reiniciar. Essencial para sensores com atualiza\u00E7\u00F5es pouco frequentes (ex. Kessel Staufix envia a cada 8-10 horas)."
  mqtt:
    name: "Configura\u00E7\u00F5es MQTT"
    description: "Configura\u00E7\u00E3o do broker MQTT para integra\u00E7\u00E3o com o Home Assistant."
  mqtt.discovery_prefix:
    name: Prefixo de descoberta
