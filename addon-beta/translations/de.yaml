---
configuration:
  serial_port:
    name: Serieller Port
    description: Serieller Port des EnOcean USB-Transceivers (z.B. /dev/ttyUSB0). Leer lassen bei TCP-Nutzung.
  tcp_port:
    name: TCP-Port
    description: "Entfernte EnOcean-Verbindung über TCP (Format: tcp:host:port, z.B. tcp:192.168.1.118:8638). Hat Vorrang vor seriellem Port."
  log_level:
    name: Log-Level
    description: Ausführlichkeit der Log-Ausgaben.
  cache_device_states:
    name: Gerätezustände zwischenspeichern
    description: Letzte Gerätezustände speichern und nach Neustart wiederherstellen. Wichtig für Sensoren mit seltenen Updates (z.B. Kessel Staufix sendet nur alle 8-10 Stunden).
  mqtt:
    name: MQTT-Einstellungen
    description: MQTT-Broker-Konfiguration für die Home Assistant Integration.
  mqtt.discovery_prefix:
    name: Discovery-Präfix
    description: MQTT-Topic-Präfix für die automatische Erkennung durch Home Assistant (normalerweise 'homeassistant').
  mqtt.prefix:
    name: Topic-Präfix
    description: MQTT-Topic-Präfix für EnOcean-Geräte (z.B. 'enocean' erzeugt Topics wie enocean/gerät/state).
  mqtt.client_id:
    name: Client-ID
    description: Eindeutige MQTT-Client-Kennung für dieses Add-on.
