---
name: "EnOcean MQTT UI (Beta)"
version: "1.6.0-beta3"
slug: "enocean-mqtt-ui-beta"
description: "BETA test build of EnOcean MQTT UI. For field-testing unreleased features (currently: detected serial/USB device list on the Settings page). Install alongside the stable app; do not run both against the same gateway/MQTT prefix at once."
url: "https://github.com/ESDN83/HA_enoceanmqtt-addon-ui"
stage: experimental
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
uart: true
udev: true
ingress: true
ingress_port: 8099
panel_icon: mdi:radio-tower
panel_title: "EnOcean β"
homeassistant_api: true
hassio_api: true
services:
  - mqtt:want
map:
  - config:rw
  - share:rw

options:
  tcp_port: ""
  log_level: "info"
  cache_device_states: true
  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
    discovery_prefix: "homeassistant"
    prefix: "enoceanmqtt"
    client_id: "enocean_gateway"

schema:
  # Native tty device selector: HA renders a dropdown of the connected serial
  # devices right in the Configuration tab (needs uart+udev). It is REQUIRED
  # (no trailing "?") — HA cannot save an empty device selector (it validates
  # '' against the device list and rejects it, even on current HA). TCP-only
  # users just pick any device; run.sh gives TCP priority so it's ignored.
  serial_port: "device(subsystem=tty)"
  tcp_port: "str?"
  log_level: "list(debug|info|warning|error)"
  cache_device_states: "bool"
  mqtt:
    host: "str?"
    port: "port?"
    username: "str?"
    password: "password?"
    discovery_prefix: "str"
    prefix: "str"
    client_id: "str"
