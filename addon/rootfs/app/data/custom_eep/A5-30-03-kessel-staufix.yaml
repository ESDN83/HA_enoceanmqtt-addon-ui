# Kessel Staufix EnOcean Profile
# Based on A5-30-03 (Digital Input, 4 Channels)
# Custom mapping for Kessel Staufix backwater valve (MV-01-01)
#
# The Staufix device only sends the Alarm (AL) bit.
# DI0-DI3 from the standard A5-30-03 are NOT used by this device.
#
# Bit offset verified against ChristopheHD/HA_enoceanmqtt-addon MV-01-01 profile
# and EnOcean A5-30-03 standard specification.
#
# 4BS data layout (32 bits, big-endian):
#   DB3 (offset 0-7)   = Condition byte (0x01 for Staufix)
#   DB2 (offset 8-15)  = Not used
#   DB1 (offset 16-23) = Not used
#   DB0 (offset 24-31) = LRN bit (28) + AL alarm (29)
#
# With data 0x0100000D:
#   AL at offset 29: shift = 32-29-1 = 2, (0x0100000D >> 2) & 1 = 1 (Alarm Active)

profile:
  rorg: "A5"
  func: "30"
  type: "03"
  description: "Kessel Staufix Backwater Valve"
  manufacturer: "Kessel"
  fields:
    - shortcut: "AL"
      description: "Alarm Status"
      offset: 29
      size: 1
      type: "enum"
      values:
        - value: 0
          description: "No Alarm"
        - value: 1
          description: "Alarm Active"

# Mapping for Home Assistant
ha_mapping:
  AL:
    component: "binary_sensor"
    name: "Alarm"
    device_class: "problem"
    icon: "mdi:alert"
