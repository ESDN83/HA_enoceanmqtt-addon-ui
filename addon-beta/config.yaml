---
name: "EnOcean MQTT UI (Beta)"
version: "1.7.0-beta4"
slug: "enocean-mqtt-ui-beta"
description: "BETA test build of EnOcean MQTT UI. For field-testing unreleased features (currently: 71-profile EEP library, multi-channel D2-01, D2-05 covers). Install alongside the stable app; do not run both against the same gateway/MQTT prefix at once."
url: "https://github.com/ESDN83/HA_enoceanmqtt-addon-ui"
stage: experimental
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
uart: true
udev: true
ingress: true
ingress_port: 8099
panel_icon: mdi:radio-tower
panel_title: "EnOcean β"
homeassistant_api: true
hassio_api: true
services:
  - mqtt:want
map:
  - config:rw
  - share:rw

options:
  tcp_port: ""
  log_level: "info"
  cache_device_states: true
  mqtt:
    host: ""
    port: 1883
    username: ""
    password: ""
    discovery_prefix: "homeassistant"
    prefix: "enoceanmqtt"
    client_id: "enocean_gateway"

schema:
  # Native tty device selector — HA shows a list of the connected serial
  # devices in the Config tab (needs uart+udev), so users can pick their
  # EnOcean gateway. A device MUST be selected: HA rejects an empty device
  # value ("Device '' does not exist") and offers no portable default. TCP-only
  # users pick any device; run.sh gives TCP priority so it is then ignored.
  serial_port: "device(subsystem=tty)"
  tcp_port: "str?"
  log_level: "list(debug|info|warning|error)"
  cache_device_states: "bool"
  mqtt:
    host: "str?"
    port: "port?"
    username: "str?"
    password: "password?"
    discovery_prefix: "str"
    prefix: "str"
    client_id: "str"
